# Bu config konteyner İÇİ nginx'tir ve yalnızca SPA statik dosyalarını servis
# eder. TLS sonlandırma, HTTP→HTTPS yönlendirmesi ve HSTS dış katmandaki
# reverse proxy'nin sorumluluğundadır — bu dosyaya 443/ssl EKLEMEYİN.
# Dış proxy'de asgari beklenti:
#   listen 443 ssl;  (TLS 1.2+, güncel sertifika)
#   listen 80 → return 301 https://$host$request_uri;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  (backend TRUST_PROXY=1 bunu okur)
# HSTS başlığını backend prod'da zaten gönderiyor (server/src/index.ts).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: tüm path'leri index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyalar için cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html cache'leme
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
